
# Configuration de la base de données
db.url=jdbc:mysql://localhost:3306/mediplatform_test_test
db.user=root
db.password=
db.driver=com.mysql.cj.jdbc.Driver

# Configuration Groq API
groq.api.key=YOUR_GROQ_API_KEY_HERE
groq.model=llama3-8b-8192
groq.api.url=https://api.groq.com/openai/v1/chat/completions

# Configuration Twilio SMS
# Remplacer par vos vraies valeurs depuis https://console.twilio.com
twilio.account.sid=YOUR_ACCOUNT_SID_HERE
twilio.auth.token=YOUR_AUTH_TOKEN_HERE
twilio.from=+1XXXXXXXXXX

# Configuration Stripe
# Clé secrète depuis https://dashboard.stripe.com/apikeys
# Format : sk_test_... (test) ou sk_live_... (production)
stripe.secret.key=YOUR_STRIPE_SECRET_KEY_HERE
stripe.success.url=http://localhost:8000/paiement/succes
stripe.cancel.url=http://localhost:8000
stripe.currency=eur
