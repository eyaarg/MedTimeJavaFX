<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Localisation Cabinet</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f8fafc; }

        #info-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #info-bar .title  { font-size: 15px; font-weight: 700; }
        #info-bar .subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }

        #map { width: 100%; height: calc(100vh - 58px); }

        .custom-marker {
            background: #e53e3e;
            border: 3px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .leaflet-popup-content-wrapper {
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .popup-inner { text-align: center; padding: 6px 4px; }
        .popup-inner .popup-icon {
            width: 40px; height: 40px;
            background: #ebf8ff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 8px;
        }
        .popup-inner .popup-icon svg { width: 22px; height: 22px; }
        .popup-inner .popup-name  { font-weight: 700; font-size: 14px; color: #1f2937; margin-bottom: 4px; }
        .popup-inner .popup-addr  { font-size: 12px; color: #6b7280; max-width: 200px; }
    </style>
</head>
<body>

<div id="info-bar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
    </svg>
    <div>
        <div class="title"  id="bar-title">Cabinet medical</div>
        <div class="subtitle" id="bar-adresse">Chargement...</div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var LAT     = 36.8065;
    var LON     = 10.1815;
    var NOM     = "Cabinet medical";
    var ADRESSE = "Tunis, Tunisie";

    var map = L.map('map').setView([LAT, LON], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19,
        crossOrigin: true
    }).addTo(map);

    // Icone marqueur rouge avec SVG
    var redIcon = L.divIcon({
        html: '<div style="width:24px;height:24px;background:#e53e3e;border:3px solid white;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>',
        iconSize:    [24, 24],
        iconAnchor:  [12, 24],
        popupAnchor: [0, -28],
        className:   ''
    });

    var marker = L.marker([LAT, LON], { icon: redIcon }).addTo(map);

    function buildPopup(nom, adresse) {
        return '<div class="popup-inner">' +
            '<div class="popup-icon">' +
            '<svg viewBox="0 0 24 24" fill="#3182ce"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>' +
            '</div>' +
            '<div class="popup-name">' + nom + '</div>' +
            '<div class="popup-addr">' + adresse + '</div>' +
            '</div>';
    }

    marker.bindPopup(buildPopup(NOM, ADRESSE), { maxWidth: 250 }).openPopup();

    document.getElementById('bar-title').textContent   = NOM;
    document.getElementById('bar-adresse').textContent = ADRESSE;

    function updateMap(lat, lon, nom, adresse) {
        LAT = lat; LON = lon; NOM = nom; ADRESSE = adresse;
        map.setView([lat, lon], 15);
        marker.setLatLng([lat, lon]);
        marker.setPopupContent(buildPopup(nom, adresse));
        marker.openPopup();
        document.getElementById('bar-title').textContent   = nom;
        document.getElementById('bar-adresse').textContent = adresse;
    }
</script>
</body>
</html>
